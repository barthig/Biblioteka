name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.2'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: biblioteka_test
          POSTGRES_USER: biblioteka
          POSTGRES_PASSWORD: biblioteka_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U biblioteka -d biblioteka_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: amqp, intl, pdo_pgsql, redis, sockets, zip
          coverage: none
          tools: composer:v2

      - name: Composer install
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Configure test environment
        run: |
          {
            echo "APP_ENV=test"
            echo "APP_SECRET=test_secret"
            echo "JWT_SECRET=test_jwt_secret"
            echo "DATABASE_URL=postgresql://biblioteka:biblioteka_test@127.0.0.1:5432/biblioteka_test?serverVersion=16&charset=utf8"
          } > .env.test.local

      - name: Load database schema
        run: psql "$DATABASE_URL" -f init-db-expanded-v2.sql
        env:
          DATABASE_URL: postgresql://biblioteka:biblioteka_test@127.0.0.1:5432/biblioteka_test

      - name: Run PHPUnit
        run: vendor/bin/phpunit tests

  frontend:
    name: Frontend Node ${{ matrix.node }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node:
          - '18'

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Run frontend tests
        run: npm run test

  microservices:
    name: ${{ matrix.service }} pytest
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - notification-service
          - recommendation-service

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest

  frontend-e2e:
    name: Frontend Playwright E2E
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

  docker-compose-config:
    name: Docker Compose config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate quickstart compose
        run: docker compose --env-file .env.example config

      - name: Validate distributed compose
        run: docker compose --env-file .env.example -f docker-compose.distributed.yml config

  integration-smoke:
    name: Distributed smoke tests
    runs-on: ubuntu-latest
    needs:
      - docker-compose-config

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start distributed stack
        run: docker compose --env-file .env.example -f docker-compose.distributed.yml up -d --build

      - name: Wait for gateway health
        run: |
          timeout 180 bash -c 'until curl -fsS http://localhost/health >/dev/null; do sleep 5; done'

      - name: Run gateway routing smoke test
        run: bash tests/integration/test_gateway_routing.sh

      - name: Run cross-service smoke test
        run: bash tests/integration/test_cross_service.sh

      - name: Print logs on failure
        if: failure()
        run: docker compose --env-file .env.example -f docker-compose.distributed.yml logs --no-color

      - name: Stop distributed stack
        if: always()
        run: docker compose --env-file .env.example -f docker-compose.distributed.yml down -v
