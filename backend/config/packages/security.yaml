security:
  enable_authenticator_manager: true

  password_hashers:
    App\Entity\User: 'auto'

  providers:
    app_user_provider:
      entity:
        class: App\Entity\User
        property: email

  role_hierarchy:
    ROLE_ADMIN: [ROLE_LIBRARIAN, ROLE_USER]
    ROLE_LIBRARIAN: [ROLE_USER]
    ROLE_SERVICE: [ROLE_USER]

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false
    main:
      stateless: true
      provider: app_user_provider
      lazy: true
      custom_authenticators:
        - App\Security\JwtAuthenticator

  access_control:
    # Public endpoints
    - { path: ^/api/auth/login, roles: PUBLIC_ACCESS }
    - { path: ^/api/auth/register, roles: PUBLIC_ACCESS }
    - { path: ^/api/auth/verify, roles: PUBLIC_ACCESS }
    - { path: ^/api/auth/refresh, roles: PUBLIC_ACCESS }
    - { path: ^/api/health, roles: PUBLIC_ACCESS }
    - { path: ^/health, roles: PUBLIC_ACCESS }
    - { path: ^/api/test-login$, roles: PUBLIC_ACCESS }
    - { path: ^/api/books$, roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: ^/api/books/filters$, roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: ^/api/books/recommended$, roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: ^/api/books/popular$, roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: ^/api/books/new$, roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: ^/api/books/\d+$, roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: ^/api/books/\d+/cover$, roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: ^/api/books/\d+/availability$, roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: ^/api/books/\d+/ratings$, roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: ^/api/books/\d+/reviews$, roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: ^/api/collections$, roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: ^/api/collections/\d+$, roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: ^/api/announcements$, roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: ^/api/announcements/\d+$, roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: ^/api/library/hours$, roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: ^/api/library-hours$, roles: PUBLIC_ACCESS, methods: [GET] }

    # Admin / restricted
    - { path: ^/metrics, roles: ROLE_ADMIN }
    - { path: ^/api/docs, roles: ROLE_ADMIN }
    - { path: ^/api/docs\.json, roles: ROLE_ADMIN }
    - { path: ^/api/books/export$, roles: ROLE_LIBRARIAN, methods: [GET] }
    - { path: ^/api/admin/books/\d+/assets, roles: ROLE_LIBRARIAN }
    - { path: ^/api/admin/books/\d+/copies, roles: ROLE_LIBRARIAN }
    - { path: ^/api/admin/copies/barcode, roles: ROLE_LIBRARIAN }
    - { path: ^/api/admin/catalog, roles: ROLE_LIBRARIAN }
    - { path: ^/api/admin/acquisitions, roles: ROLE_LIBRARIAN }
    - { path: ^/api/admin, roles: ROLE_ADMIN }
    - { path: ^/admin, roles: ROLE_ADMIN }

    # Default API access
    - { path: ^/api, roles: ROLE_USER }

