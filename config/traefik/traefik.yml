# Traefik API Gateway - static configuration
api:
  dashboard: false
  insecure: false

entryPoints:
  web:
    address: ":80"
  metrics:
    address: ":8082"

providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

serversTransport:
  forwardingTimeouts:
    dialTimeout: 5s
    responseHeaderTimeout: 15s
    idleConnTimeout: 30s

log:
  level: INFO
  format: json

accessLog:
  format: json
  fields:
    headers:
      defaultMode: keep

metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true
    addServicesLabels: true
    addRoutersLabels: true

# Distributed tracing via OpenTelemetry (Traefik v3 native)
tracing:
  otlp:
    http:
      endpoint: "http://jaeger:4318"
