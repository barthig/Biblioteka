###############################################################################
# Biblioteka - System zarządzania biblioteką (Distributed Architecture Docker Compose)
#
# Services:
#   Infrastructure:  traefik, rabbitmq, redis, mailpit
#   Databases:       db (catalog+loans), notification-db, recommendation-db
#   Backend:         backend (PHP-FPM), nginx, php-worker
#   Microservices:   notification-service (Python), recommendation-service (Python)
#   Frontend:        frontend (React/Vite)
#   Observability:   prometheus, grafana, jaeger
###############################################################################

services:

  # Traefik - API Gateway i serwer routowania
  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    ports:
      - "80:80"        # Main entry point
      - "8080:8080"    # Dashboard
      - "8082:8082"    # Metrics
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./config/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    environment:
      TRAEFIK_API_DASHBOARD: "true"
      TRAEFIK_METRICS_PROMETHEUS: "true"
    networks:
      - main
    depends_on:
      - backend

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - main
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - main
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"    # SMTP
      - "8025:8025"    # Web UI
    networks:
      - main

  # Baza danych główna (katalog i wypożyczenia)
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: biblioteka
      POSTGRES_USER: ${MAIN_DB_USER:-biblioteka}
      POSTGRES_PASSWORD: ${MAIN_DB_PASSWORD:-change_me_main_db}
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=vector"
    volumes:
      - ./backend/init-db-expanded-v2.sql:/docker-entrypoint-initdb.d/01-init.sql
      - db_data:/var/lib/postgresql/data
    networks:
      - main
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biblioteka -d biblioteka"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Baza danych usługi powiadomień
  notification-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: ${NOTIFICATION_DB_USER:-notifications}
      POSTGRES_PASSWORD: ${NOTIFICATION_DB_PASSWORD:-change_me_notification_db}
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    networks:
      - main
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifications -d notifications"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Baza danych usługi rekomendacji
  recommendation-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: recommendations
      POSTGRES_USER: ${RECOMMENDATION_DB_USER:-recommendations}
      POSTGRES_PASSWORD: ${RECOMMENDATION_DB_PASSWORD:-change_me_recommendation_db}
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=vector"
    volumes:
      - recommendation_db_data:/var/lib/postgresql/data
    networks:
      - main
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recommendations -d recommendations"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend PHP-FPM
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${MAIN_DB_USER:-biblioteka}:${MAIN_DB_PASSWORD:-change_me_main_db}@db:5432/biblioteka?serverVersion=16&charset=utf8
      REDIS_URL: redis://redis:6379
      MESSENGER_TRANSPORT_DSN: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/%2f/messages
      MESSENGER_FAILURE_TRANSPORT_DSN: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/%2f/messages_failed
      INTEGRATION_AMQP_DSN: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/%2f/messages
      API_SECRET: ${API_SECRET:-change_me_api}
      JWT_SECRET: ${JWT_SECRET:-change_me_jwt_distributed_1234567890}
      APP_ENV: distributed
      APP_DISTRIBUTED_MODE: 1
      APP_DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - main

  # PHP Worker (procesuje job'i asynchronicznie)
  php-worker:
    build:
      context: ./backend
      dockerfile: ../docker/php-worker/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${MAIN_DB_USER:-biblioteka}:${MAIN_DB_PASSWORD:-change_me_main_db}@db:5432/biblioteka?serverVersion=16&charset=utf8
      REDIS_URL: redis://redis:6379
      MESSENGER_TRANSPORT_DSN: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/%2f/messages
      MESSENGER_FAILURE_TRANSPORT_DSN: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/%2f/messages_failed
      INTEGRATION_AMQP_DSN: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/%2f/messages
      API_SECRET: ${API_SECRET:-change_me_api}
      JWT_SECRET: ${JWT_SECRET:-change_me_jwt_distributed_1234567890}
      APP_ENV: distributed
      APP_DISTRIBUTED_MODE: 1
      CONTAINER_ROLE: worker
    depends_on:
      - backend
      - rabbitmq
      - redis
    networks:
      - main

  # Nginx reverse proxy do PHP
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/public:/app/public:ro
    depends_on:
      - backend
    networks:
      - main

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost
    depends_on:
      - backend
    networks:
      - main

  # Usługa powiadomień (Python FastAPI)
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NOTIFICATION_DATABASE_URL: postgresql://${NOTIFICATION_DB_USER:-notifications}:${NOTIFICATION_DB_PASSWORD:-change_me_notification_db}@notification-db:5432/notifications
      NOTIFICATION_RABBITMQ_HOST: rabbitmq
      NOTIFICATION_RABBITMQ_PORT: 5672
      NOTIFICATION_RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      NOTIFICATION_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      NOTIFICATION_RABBITMQ_VHOST: /
      LOG_LEVEL: INFO
    depends_on:
      notification-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - main

  # Usługa rekomendacji (Python FastAPI + pgvector)
  recommendation-service:
    build:
      context: ./recommendation-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      RECOMMENDATION_DATABASE_URL: postgresql://${RECOMMENDATION_DB_USER:-recommendations}:${RECOMMENDATION_DB_PASSWORD:-change_me_recommendation_db}@recommendation-db:5432/recommendations
      RECOMMENDATION_RABBITMQ_HOST: rabbitmq
      RECOMMENDATION_RABBITMQ_PORT: 5672
      RECOMMENDATION_RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RECOMMENDATION_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RECOMMENDATION_RABBITMQ_VHOST: /
      RECOMMENDATION_OPENAI_API_KEY: ${OPENAI_API_KEY:-change_me_openai_key}
      RECOMMENDATION_OPENAI_MODEL: text-embedding-3-small
      LOG_LEVEL: INFO
    depends_on:
      recommendation-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - main

  # Prometheus - zbieranie metryk
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - main

  # Grafana - wizualizacja metryk
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change_me_grafana_admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - main

  # Jaeger - distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: unless-stopped
    ports:
      - "6831:6831/udp"  # Jaeger agent
      - "16686:16686"    # UI
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
    networks:
      - main

networks:
  main:
    driver: bridge

volumes:
  db_data:
  notification_db_data:
  recommendation_db_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
