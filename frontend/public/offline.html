<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biblioteka offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Georgia, "Times New Roman", serif;
        background: radial-gradient(circle at top, #f7f2e7, #d9e3f3 60%, #c4d3ea 100%);
        color: #1c2f4a;
      }
      main {
        max-width: 32rem;
        padding: 2rem;
        border-radius: 1.5rem;
        background: rgba(255,255,255,0.88);
        box-shadow: 0 1rem 3rem rgba(28,47,74,0.18);
      }
      h1 { margin-top: 0; }
      p { line-height: 1.6; }
      a {
        color: #1c2f4a;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Brak polaczenia z siecia</h1>
      <p>Aplikacja Biblioteka dziala w trybie offline tylko dla zapisanej powloki i ostatnio odwiedzonych zasobow.</p>
      <p>Sprobuj odswiezyc strone po odzyskaniu polaczenia albo wrocic do <a href="/">strony glownej</a>.</p>
    </main>
  </body>
</html>
